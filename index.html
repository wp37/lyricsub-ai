
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LyricSub Extractor - Trích xuất lời & phụ đề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Added common Karaoke fonts: Anton, Lobster, Patrick Hand, Be Vietnam Pro, Comfortaa -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&family=Dancing+Script:wght@700&family=Anton&family=Lobster&family=Patrick+Hand&family=Be+Vietnam+Pro:wght@700;900&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <script>
      // Khởi tạo theme dựa trên cấu hình cũ hoặc mặc định là DARK (Vàng Đen sang trọng)
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark')
      } else {
        document.documentElement.classList.add('dark')
        localStorage.setItem('theme', 'dark')
      }
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              indigo: {
                50: '#fdfbeb',
                100: '#fbf4c1',
                200: '#f8e682',
                300: '#f4ce43',
                400: '#f0b51a',
                500: '#df9c10', // Rich radiant gold accent
                600: '#b8790a', // Burnished luxury gold
                700: '#8f560a',
                800: '#70410d',
                900: '#5a310e',
                950: '#331704',
              },
              violet: {
                50: '#fefbf0',
                100: '#fcf2c5',
                200: '#fbe28b',
                300: '#fac74d',
                400: '#f6aa1c', // Royal warm amber-gold
                500: '#e38c0b', // Radiant sunset bronze gold
                600: '#bb6807',
                700: '#924907',
                800: '#75370d',
                900: '#602c0f',
                950: '#381305',
              },
              slate: {
                50: '#faf9f5', // Soft luxury alabaster white
                100: '#f4f3ec', // Light champagne gray
                200: '#e5e1d3', // Neutral muted luxury gray
                300: '#cbbfa6',
                400: '#a3977e',
                500: '#79705e',
                600: '#575043',
                700: '#3e3930',
                800: '#262420', // Elegant obsidian dark grey
                900: '#151412', // Rich obsidian jet-black
                950: '#0b0a09', // Absolute deep pitch velvet black
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        transition: background-color 0.3s ease;
      }
      .glass {
        background: rgba(255, 255, 245, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .glass {
        background: rgba(15, 14, 12, 0.75);
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #df9c10;
        border-radius: 10px;
      }
    </style>

  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
